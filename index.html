<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary -->
    <title>WordPint — Pour a Pint, Learn a Word</title>
    <meta
      name="description"
      content="WordPint is a physics-based word game: pour letter tiles into a pint glass, discover the words you can spell with what's in the cup, and learn what they mean. Pour a pint, learn a word."
    />
    <meta name="author" content="John Choudhari" />
    <meta
      name="keywords"
      content="WordPint, word game, vocabulary, dictionary, anagram, physics game, learn words, word puzzle, spelling game"
    />
    <meta name="theme-color" content="#f7f3ea" />
    <link rel="canonical" href="https://wordpint.com/" />

    <!-- Favicon (beer emoji) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://wordpint.com/" />
    <meta property="og:site_name" content="WordPint" />
    <meta property="og:title" content="WordPint — Pour a Pint, Learn a Word" />
    <meta
      property="og:description"
      content="A playful physics-based word game. Pour letter tiles into a pint glass and discover the words you can spell — and what they mean."
    />
    <meta property="og:image" content="https://wordpint.com/share.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="WordPint — a tap pouring lettered tiles into a pint glass next to the WordPint wordmark, tagline 'Pour a pint, learn a word', and the URL wordpint.com"
    />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="WordPint — Pour a Pint, Learn a Word" />
    <meta
      name="twitter:description"
      content="Pour letter tiles into a pint glass and discover the words you can spell — and what they mean."
    />
    <meta name="twitter:image" content="https://wordpint.com/share.png" />
    <meta
      name="twitter:image:alt"
      content="WordPint — a tap pouring lettered tiles into a pint glass next to the WordPint wordmark and tagline 'Pour a pint, learn a word'"
    />

    <!-- Application name (PWA-style hint for mobile add-to-home) -->
    <meta name="application-name" content="WordPint" />
    <meta name="apple-mobile-web-app-title" content="WordPint" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- Structured data: WebApplication / Game -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "WordPint",
        "alternateName": "WordPint — Pour a Pint, Learn a Word",
        "url": "https://wordpint.com/",
        "description": "A physics-based word game where you pour letter tiles into a pint glass and discover the words you can spell, complete with their definitions.",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Any (web)",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "author": {
          "@type": "Person",
          "name": "John Choudhari",
          "url": "https://www.linkedin.com/in/johnchoudhari/"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
